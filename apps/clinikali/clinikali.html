<!DOCTYPE html>
<html>
  <head>
    <title>Clinikali Data Download</title>
    <link rel="stylesheet" href="../../css/spectre.min.css" />
  </head>
  <body>
    <div id="files"></div>
    <div class="container" id="toastcontainer"></div>

    <script src="../../core/lib/interface.js"></script>
    <script src="../../core/js/ui.js"></script>
    <script src="../../core/js/utils.js"></script>
    <script>
      /**
       * @typedef {Object} FileData
       * @property {string} filename
       * @property {string} fileNumber
       * @property {string} content
       */

      /** @type {HTMLElement} */
      const domFiles = document.getElementById("files");

      /**
       * @param {string} filename
       * @param {(data: string) => void} callback
       */
      function downloadFile(filename, callback) {
        Util.showModal(`Downloading ${filename}...`);
        Util.readStorageFile(filename, (data) => {
          Util.hideModal();
          callback(data);
        });
      }

      /**
       * @param {string} data
       * @param {string} title
       */
      function saveCSV(data, title) {
        Util.saveFile(title + ".csv", "text/csv", data);
        showToast("Download finished.", "success");
      }

      /**
       * @param {FileData[]} files
       * @returns {string}
       */
      function generateFileListHTML(files) {
        if (files.length === 0) {
          return `
            <div class="container">
              <h2>Files</h2>
              <div class="columns">
                <div class="column col-12">
                  <div class="card-header">
                    <div class="card-title h5">No files</div>
                    <div class="card-subtitle text-gray">No recorded data found</div>
                  </div>
                </div>
              </div>
            </div>`;
        }

        const fileCards = files
          .map(
            ({ filename, fileNumber }) => `
              <div class="column col-12">
                <div class="card">
                  <div class="card-header">
                    <div class="card-title h5">File ${fileNumber}</div>
                  </div>
                  <div class="card-footer">
                    <button class="btn btn-primary" filename="${filename}" task="download">Download CSV</button>
                    <button class="btn btn-default" filename="${filename}" task="delete">Delete</button>
                  </div>
                </div>
              </div>`,
          )
          .join("");

        return `
          <div class="container">
            <h2>Files</h2>
            <div class="columns">
              ${fileCards}
            </div>
          </div>`;
      }

      /**
       * @param {HTMLElement} button
       */
      function handleButtonClick(button) {
        const filename = button.getAttribute("filename");
        const task = button.getAttribute("task");

        const actions = {
          download: () =>
            downloadFile(filename, (data) => saveCSV(data, filename)),
          delete: () => {
            Util.showModal(`Deleting ${filename}...`);
            Util.eraseStorageFile(filename, () => {
              Util.hideModal();
              getFileList();
            });
          },
        };

        actions[task]?.();
      }

      /**
       * @param {HTMLElement} container
       */
      function attachButtonHandlers(container) {
        Array.from(container.querySelectorAll("button")).forEach((button) => {
          button.addEventListener("click", (e) =>
            handleButtonClick(e.currentTarget),
          );
        });
      }

      function getFileList() {
        Util.showModal("Loading File List...");
        domFiles.innerHTML = "";

        Puck.eval(
          'require("Storage").list(/^clinikali\\.log.*\\.csv$/,{sf:1})',
          (files) => {
            /** @type {FileData[]} */
            const fileData = files.map((filename) => ({
              filename,
              fileNumber: filename.match(/^clinikali\.log(.*)\.csv$/)[1],
              content: "",
            }));

            domFiles.innerHTML = generateFileListHTML(fileData);
            attachButtonHandlers(domFiles);
            Util.hideModal();
          },
        );
      }

      function onInit() {
        getFileList();
      }
    </script>
  </body>
</html>
