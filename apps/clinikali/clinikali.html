<!doctype html>
<html>
  <head>
    <title>Clinikali Data Download</title>
    <link rel="stylesheet" href="../../css/spectre.min.css" />
    <style>
      .bar {
        height: 20px;
        background-color: #f0f0f0;
        border-radius: 4px;
        overflow: hidden;
        margin: 10px 0;
      }
      .bar-item {
        height: 100%;
        background-color: #5755d9;
        color: white;
        text-align: center;
        line-height: 20px;
        transition: width 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="files"></div>
    <div class="container" id="toastcontainer"></div>

    <script src="../../core/lib/interface.js"></script>
    <script src="../../core/js/ui.js"></script>
    <script src="../../core/js/utils.js"></script>
    <script>
      var domFiles = document.getElementById("files");

      function showProgress(text, percent) {
        Util.showModal(`
       <div class="modal-body">
         <div class="bar">
           <div class="bar-item" style="width:${percent}%;">
             ${text} (${percent}%)
           </div>
         </div>
       </div>
     `);
      }

      function downloadFile(filename, callback) {
        showProgress(`Downloading ${filename}`, 0);

        Puck.eval(
          `(function() {
       let file = require("Storage").open("${filename}","r");
       let length = file.getLength();
       return length;
     })()`,
          (fileLength) => {
            let content = "";
            const CHUNK_SIZE = 4096;

            function readChunk(offset) {
              Puck.eval(
                `(function() {
           let file = require("Storage").open("${filename}","r");
           file.seek(${offset});
           return file.read(${CHUNK_SIZE});
         })()`,
                (chunk) => {
                  if (chunk) {
                    content += chunk;
                    const progress = Math.floor(
                      (content.length / fileLength) * 100,
                    );
                    showProgress(`Downloading ${filename}`, progress);
                    setTimeout(() => readChunk(content.length), 1);
                  } else {
                    // Done reading
                    Util.hideModal();
                    callback(content);
                  }
                },
              );
            }

            readChunk(0);
          },
        );
      }

      function saveCSV(data, title) {
        const blob = new Blob([data], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = title;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("Download finished.", "success");
      }

      function downloadAll() {
        Puck.eval(
          `require("Storage").list(/^clinikali\\.log.*\\.csv$/,{sf:1})`,
          (files) => {
            let downloaded = 0;

            function downloadNext() {
              if (downloaded >= files.length) {
                showToast("All files downloaded", "success");
                return;
              }

              const filename = files[downloaded];
              downloadFile(filename, (data) => {
                saveCSV(data, filename);
                downloaded++;
                downloadNext();
              });
            }

            downloadNext();
          },
        );
      }

      function getFileList() {
        showProgress("Loading File List", 0);
        domFiles.innerHTML = "";

        Puck.eval(
          `require("Storage").list(/^clinikali\\.log.*\\.csv$/,{sf:1})`,
          (files) => {
            var html = `
       <div class="container">
         <h2>Files</h2>
         <div class="columns">`;

            files.forEach((filename) => {
              const fileNumber = filename.match(/^clinikali\.log(.*)\.csv$/)[1];
              html += `
           <div class="column col-12">
             <div class="card">
               <div class="card-header">
                 <div class="card-title h5">File ${fileNumber}</div>
               </div>
               <div class="card-footer">
                 <button class="btn btn-primary" filename="${filename}" task="download">Download CSV</button>
                 <button class="btn btn-default" filename="${filename}" task="delete">Delete</button>
               </div>
             </div>
           </div>`;
            });

            if (files.length === 0) {
              html += `
           <div class="column col-12">
             <div class="card-header">
               <div class="card-title h5">No files</div>
               <div class="card-subtitle text-gray">No recorded data found</div>
             </div>
           </div>`;
            } else {
              html += `
           <div class="column col-12">
             <div class="card">
               <div class="card-footer">
                 <button class="btn btn-primary" task="downloadall">Download All Files</button>
               </div>
             </div>
           </div>`;
            }

            html += `
         </div>
       </div>`;

            domFiles.innerHTML = html;
            Util.hideModal();

            var buttons = domFiles.querySelectorAll("button");
            for (var i = 0; i < buttons.length; i++) {
              buttons[i].addEventListener("click", (event) => {
                var button = event.currentTarget;
                var filename = button.getAttribute("filename");
                var task = button.getAttribute("task");

                switch (task) {
                  case "download":
                    downloadFile(filename, (data) => saveCSV(data, filename));
                    break;

                  case "downloadall":
                    downloadAll();
                    break;

                  case "delete":
                    showProgress(`Deleting ${filename}`, 0);
                    Util.eraseStorageFile(filename, () => {
                      Util.hideModal();
                      getFileList();
                    });
                    break;
                }
              });
            }
          },
        );
      }

      // Initialize when page loads
      function onInit() {
        getFileList();
      }

      // Start the app
      onInit();
    </script>
  </body>
</html>
