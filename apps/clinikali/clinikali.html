<!doctype html>
<html>
  <head>
    <title>Clinikali Data Download</title>
    <link rel="stylesheet" href="../../css/spectre.min.css" />
    <style>
      .progress-bar {
        width: 100%;
        height: 20px;
        background-color: #f5f5f5;
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-bar-inner {
        height: 100%;
        background-color: #5755d9;
        transition: width 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="files"></div>
    <div class="container" id="toastcontainer"></div>

    <script src="../../core/lib/interface.js"></script>
    <script src="../../core/js/ui.js"></script>
    <script src="../../core/js/utils.js"></script>
    <script>
      var domFiles = document.getElementById("files");

      function downloadFile(filename) {
        return new Promise((resolve, reject) => {
          const modal = document.createElement("div");
          modal.innerHTML = `
          <div class="modal-body">
            <div>Downloading ${filename}</div>
            <div class="progress-bar">
              <div class="progress-bar-inner" style="width: 0%"></div>
            </div>
          </div>
        `;
          Util.showModal(modal);

          // Get file size first
          Puck.eval(
            `require("Storage").open("${filename}","r").getLength()`,
            (size) => {
              if (!size) {
                Util.hideModal();
                reject("File not found or empty");
                return;
              }

              const totalSize = parseInt(size);
              let data = "";

              function readChunk(position) {
                const chunkSize = 2048; // Increased chunk size
                Puck.eval(
                  `(function() {
              var f = require("Storage").open("${filename}","r");
              f.seek(${position});
              return f.read(${chunkSize});
            })()`,
                  (chunk) => {
                    if (chunk) {
                      data += chunk;
                      const progress = Math.min(
                        100,
                        Math.round((data.length / totalSize) * 100),
                      );
                      modal.querySelector(".progress-bar-inner").style.width =
                        progress + "%";

                      if (data.length < totalSize) {
                        setTimeout(() => readChunk(data.length), 50); // Added small delay between chunks
                      } else {
                        Util.hideModal();
                        resolve(data);
                      }
                    } else {
                      Util.hideModal();
                      resolve(data);
                    }
                  },
                );
              }

              readChunk(0);
            },
          );
        });
      }

      function saveCSV(data, filename) {
        Util.saveFile(filename, "text/csv", data);
        showToast("Download complete!", "success");
      }

      function getFileList() {
        Util.showModal("Loading File List...");
        domFiles.innerHTML = "";

        // List all clinikali files
        Puck.eval(
          `require("Storage").list(/^clinikali\\.log.*\\.csv$/,{sf:1})`,
          (files) => {
            let html = `
        <div class="container">
          <h2>Files</h2>
          <div class="columns">`;

            files.forEach((filename) => {
              const fileNumber = filename.match(/^clinikali\.log(.*)\.csv$/)[1];

              // Get file size
              Puck.eval(
                `require("Storage").open("${filename}","r").getLength()`,
                (size) => {
                  const fileSize = (size / 1024).toFixed(1) + " KB";
                  html += `
              <div class="column col-12">
                <div class="card">
                  <div class="card-header">
                    <div class="card-title h5">File ${fileNumber}</div>
                    <div class="card-subtitle text-gray">Size: ${fileSize}</div>
                  </div>
                  <div class="card-footer">
                    <button class="btn btn-primary" filename="${filename}" task="download">Download CSV</button>
                    <button class="btn btn-default" filename="${filename}" task="delete">Delete</button>
                  </div>
                </div>
              </div>`;
                },
              );
            });

            if (files.length === 0) {
              html += `
            <div class="column col-12">
              <div class="card-header">
                <div class="card-title h5">No files</div>
                <div class="card-subtitle text-gray">No recorded data found</div>
              </div>
            </div>`;
            }

            html += `</div></div>`;
            domFiles.innerHTML = html;
            Util.hideModal();

            var buttons = domFiles.querySelectorAll("button");
            for (var i = 0; i < buttons.length; i++) {
              buttons[i].addEventListener("click", async (event) => {
                var button = event.currentTarget;
                var filename = button.getAttribute("filename");
                var task = button.getAttribute("task");

                switch (task) {
                  case "download":
                    try {
                      const data = await downloadFile(filename);
                      saveCSV(data, filename);
                    } catch (error) {
                      showToast("Download failed: " + error, "error");
                    }
                    break;

                  case "delete":
                    Util.showModal(`Deleting ${filename}...`);
                    Util.eraseStorageFile(filename, () => {
                      Util.hideModal();
                      getFileList();
                    });
                    break;
                }
              });
            }
          },
        );
      }

      // Initialize when page loads
      function onInit() {
        getFileList();
      }

      // Start the app
      onInit();
    </script>
  </body>
</html>
